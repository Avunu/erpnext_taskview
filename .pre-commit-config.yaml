exclude: "node_modules|.git"
default_stages: [pre-commit]
fail_fast: false

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        files: "erpnext_taskview.*"
        exclude: ".*json$|.*txt$|.*csv|.*md|.*svg"
      - id: check-merge-conflict
      - id: check-ast
      - id: check-json
      - id: check-toml
      - id: check-yaml
      - id: debug-statements

  # ssort to sort methods source files
  - repo: https://github.com/bwhmather/ssort
    rev: 0.16.0
    hooks:
      - id: ssort
        # Exclude auto-generated Frappe DocType files
        exclude: '/doctype/[^/]+/[^/]+\.py$'

  - repo: https://github.com/agritheory/test_utils
    rev: v1.23.0
    hooks:
      # - id: update_pre_commit_config
      - id: validate_frappe_project
      - id: validate_copyright
        files: '\.(js|ts|py|md)$'
        args: ['--app', 'erpnext_taskview']
      - id: bylines
        exclude: 'README.md|CHANGELOG.md'
      - id: clean_customized_doctypes
        args: ['--app', 'erpnext_taskview']
      - id: validate_customizations
      - id: validate_patches
        args: ['--app', 'erpnext_taskview']
      - id: track_overrides
        args: ['--directory', '.', '--app', 'erpnext_taskview', '--base-branch', 'main']

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        name: "Run ruff import sorter"
        args: ["--select=I", "--fix"]

      - id: ruff
        name: "Run ruff linter"

      - id: ruff-format
        name: "Run ruff formatter"

  - repo: https://github.com/oxc-project/mirrors-oxfmt
    rev: v0.45.0
    hooks:
      - id: oxfmt
        files: "erpnext_taskview.*"
        types_or: [javascript, vue, scss]
        exclude: |
          (?x)^(
              erpnext_taskview/public/dist/.*|
              .*node_modules.*|
              .*boilerplate.*|
              erpnext_taskview/templates/includes/.*|
              erpnext_taskview/public/js/lib/.*
          )$

  - repo: https://github.com/oxc-project/mirrors-oxlint
    rev: v1.60.0
    hooks:
      - id: oxlint
        args: ["--quiet"]
        exclude: |
          (?x)^(
              erpnext_taskview/public/dist/.*|
              cypress/.*|
              .*node_modules.*|
              .*boilerplate.*|
              erpnext_taskview/templates/includes/.*|
              erpnext_taskview/public/js/lib/.*
          )$

ci:
  autoupdate_schedule: weekly
  skip: []
  submodules: false
